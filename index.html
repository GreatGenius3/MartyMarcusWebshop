<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
   <!--  <meta http-equiv="X-UA-Compatible" content="IE=edge"> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webbshop</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>    
</head>
<body>
    <header>
        <h1>Webbshop</h1>
        <p class="roboto">Det h?r stycket i Roboto-font.</p>
        <p class="playwrite-dk-uloopet-guides-regular">Det h?r stycket i Annan font-font.</p>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Vi skamf?rst skapa olika besta?llnings formul?r 
    Det ska vara f?ljande f?lt.
    - Fulla namn
    - Adress
    - Postnummer
    - Stad
    - Telefonnummer
    - e-mail --> 

    <main>
        <section class="product-list">
            <div class="product">
                <img src="product1.jpg" alt="Product 1">
                <h2>Product 1</h2>
                <p>$19.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="product2.jpg" alt="Product 2">
                <h2>Product 2</h2>
                <p>$29.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="product3.jpg" alt="Product 3">
                <h2>Product 3</h2>
                <p>$39.99</p>
                <button>Add to Cart</button>
            </div>
            <div class="product">
                <img src="product4.jpg" alt="Product 4">
                <h2>Product 4</h2>
                <p>$49.99</p>
                <button>Add to Cart</button>
            </div>
        </section>
    </main>

    <form id="myForm">
    <fieldset>
      <legend>Order</legend>

      <div class="card">
        <div class="card-body">
          <div id="inputContainer">
            <label for="name" class="form-label mt-4">F?r och Efternamn</label>
            <input type="text" class="form-control" id="name" placeholder="Jane Doe">
          </div>

          <div>
            <label for="streetName" class="form-label mt-4">Adress</label>
            <input type="text" class="form-control" id="streetName" placeholder="Wallstreet">
          </div>

          <div>
            <label for="zipCode" class="form-label mt-4">Postnummer</label>
            <input type="text" class="form-control" id="zipCode" placeholder="12133">
          </div>

          <div>
            <label for="city" class="form-label mt-4">Stad</label>
            <input type="text" class="form-control" id="city" placeholder="Stockholm">
          </div>

          <div>
            <label for="phone-number" class="form-label mt-4">Telefonnummer</label>
            <input type="text" class="form-control" id="phone-number" placeholder="(+46)701234578">
          </div>

          <div>
            <label for="exampleInputEmail1" class="form-label mt-4">Email</label>
            <input type="text" class="form-control" id="exampleInputEmail1" placeholder="email@example.com">
          </div>
        </div>
      </div>

      

      
      <br>
      <button type="submit" class="btn btn-primary">Confirm order</button>
    </fieldset>
  </form>

  <script src="scripts.js"></script>
</body>
</html>
