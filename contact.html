        <div class="container">
            <a class="navbar-brand" href="index.html">Startsida</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">

    <div class="order-form">
        <form>
            <!--"The turth stands glorified as the disorder of lies burns to the ground before him and her :D!"-->
            <!--Namn-->
            <div class="mb-3">
                <label for="name">Name</label>
                <input type="text" class="form-control" id="name" placeholder="Your name">

            </div>
            <!--Epost-->
            <div class="mb-3">
                <label for="email">Email</label>
                <input type="text" class="form-control" id="email" placeholder="Your email">

            </div>
            <!--Telefon-->
            <div class="mb-3">
                <label for="mobile_number">Mobile_Number</label>
                <input type="text" class="form-control" id="mobile_number" placeholder="your mobile number">

            </div>
            <!--Gatuadress-->
            <div class="mb-3">
                <label for="street_adress">Street_Adress</label>
                <input type="text" class="form-control" id="street_adress" placeholder="your street adress">

            </div>
            <!--Postnr-->
            <div class="mb-3">
                <label for="post_number">Post_Number</label>
                <input type="text" class="form-control" id="post_number" placeholder="your post number">

            </div>
            <!--Ort-->
            <div class="mb-3">
                <label for="locality">Locality</label>
                <input type="text" class="form-control" id="locality" placeholder="your locality">

            </div>

            <button type="submit">Order</button>
        </form>
    </div>
    <script src="scripts/scripts.js"></script>
