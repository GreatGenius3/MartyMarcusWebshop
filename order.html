<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Orderbekräftelse - MartyMarcus Webbshop</title>
    <link href="styles/styles.css" rel="stylesheet" />
</head>
<body>
    <!-- Navigation baren ovanpå sidan -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Startsida</a>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="py-5 bg-image-full" style="background-image: url('images/landscape-abstract.jpg')">
        <div class="text-center my-5">
            <h1 class="text-white fs-3 fw-bolder">Orderbekräftelse</h1>
            <p class="text-white-50 mb-0">Slutför ditt köp</p>
        </div>
    </header>

    <main class="py-5">
        <div class="container">
            <div class="row">
                <div class="col-lg-6 mb-4">
                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <h3 class="mb-0">Vald produkt</h3>
                        </div>
                        <div class="card-body">
                            <div id="productInfo" class="text-center">
                                <!-- Produktdata kommer att visas hأ¤r -->
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-lg-6 mb-4">
                    <div class="card">
                        <div class="card-header bg-success text-white">
                            <h3 class="mb-0">Kundinformation</h3>
                        </div>
                        <div class="card-body">
                            <form id="orderForm">
                                <div class="mb-3">
                                    <label for="name" class="form-label">Namn *</label>
                                    <input type="text" class="form-control" id="name" required>
                                </div>
                                <div class="mb-3">
                                    <label for="email" class="form-label">E-post *</label>
                                    <input type="text" class="form-control" id="email" required>
                                </div>
                                <div class="mb-3">
                                    <label for="mobile_number" class="form-label">Telefonnummer *</label>
                                    <input type="text" class="form-control" id="mobile_number" required>
                                </div>
                                <div class="mb-3">
                                    <label for="street_adress" class="form-label">Adress *</label>
                                    <input type="text" class="form-control" id="street_adress" required>
                                </div>
                                <div class="mb-3">
                                    <label for="post_number" class="form-label">Postnummer *</label>
                                    <input type="text" class="form-control" id="post_number" required>
                                </div>
                                <div class="mb-3">
                                    <label for="locality" class="form-label">Ort *</label>
                                    <input type="text" class="form-control" id="locality" required>
                                </div>

                                <button type="submit" class="btn btn-success btn-lg w-100">Bekräfta köp</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="py-5 bg-dark">
        <div class="container"><p class="m-0 text-center text-white">Copyright &copy; MartyMarcus Webbshop 2026</p></div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts/scripts.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function()
        {
            const savedProduct = sessionStorage.getItem('valdProdukt');
            if (savedProduct)
            {
                const product = JSON.parse(savedProduct);
                displayOrderProduct(product);
            }
            else
            {
                window.location.href = 'index.html';
            }
        });

        // localStorage.setItem()
        // console.log(localStorage);

        function displayOrderProduct(product)
        {
            const productInfo = document.getElementById('productInfo');
            const img = document.createElement('img');
            img.src = product.image;
            img.alt = product.title;
            img.className = 'img-fluid rounded mb-3';

            const title = document.createElement('h4');
            title.textContent = product.title;

            const price = document.createElement('p');
            price.className = 'text-success fw-bold fs-4';
            price.textContent = '$' + product.price;

            const id = document.createElement('p');
            id.className = 'text-muted';
            id.textContent = 'Produkt ID: ' + product.id;

            productInfo.appendChild(img);
            productInfo.appendChild(title);
            productInfo.appendChild(price);
            productInfo.appendChild(id);
        }
    </script>
</body>

</html>
